<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C8A96E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A67C52;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Crown / Rajput emblem -->
  <g transform="translate(10, 8)" fill="url(#gold)">
    <!-- Shield base -->
    <path d="M32 6 L48 6 L56 18 L40 60 L24 60 L8 18 Z" fill="none" stroke="#C8A96E" stroke-width="2"/>
    <!-- Dome top -->
    <path d="M24 18 Q40 -2 56 18" fill="none" stroke="#C8A96E" stroke-width="2"/>
    <!-- Inner lotus -->
    <ellipse cx="40" cy="32" rx="10" ry="14" fill="none" stroke="#C8A96E" stroke-width="1.5"/>
    <path d="M40 18 L40 46" stroke="#C8A96E" stroke-width="1"/>
    <path d="M30 32 L50 32" stroke="#C8A96E" stroke-width="1"/>
    <!-- Small dome -->
    <circle cx="40" cy="10" r="4" fill="#C8A96E" opacity="0.3"/>
  </g>
  <!-- Resort Name -->
  <text x="80" y="38" font-family="'Playfair Display', Georgia, serif" font-size="28" font-weight="700" fill="#3B2F2F" letter-spacing="3">RAJPUT</text>
  <text x="80" y="62" font-family="'Playfair Display', Georgia, serif" font-size="16" font-weight="400" fill="#C8A96E" letter-spacing="8">RESORT</text>
  <!-- Decorative line -->
  <line x1="80" y1="44" x2="230" y2="44" stroke="#C8A96E" stroke-width="0.5"/>
</svg>
